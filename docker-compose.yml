name: groundcontrol

services:
  mongodb:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch(e) { quit(1) }"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - groundcontrol_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - dp_keys:/keys
    environment:
      # MongoDB connection (ConnectionStrings:Storage + Persistence:MongoDb:DatabaseName)
      ConnectionStrings__Storage: "mongodb://mongodb:27017/?replicaSet=rs0"
      Persistence__MongoDb__DatabaseName: "groundcontrol"
      # Authentication (set to None for initial setup; change to BuiltIn or External for production)
      GroundControl__Security__AuthenticationMode: "None"
      # Data Protection (FileSystem mode, keys mounted at /keys)
      DataProtection__Mode: "FileSystem"
      DataProtection__KeyStorePath: "/keys"
      # Change notifier (InProcess for single-instance; use MongoChangeStream for multi-instance)
      ChangeNotifier__Mode: "InProcess"
      # OpenTelemetry (optional; uncomment and set endpoint for OTLP collector)
      # OpenTelemetry__Endpoint: "http://otel-collector:4317"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - groundcontrol_net

volumes:
  mongo_data:
  dp_keys:

networks:
  groundcontrol_net:
    driver: bridge
