# Reusable release workflow template.
#
# Called by link-release.yml and cli-release.yml. Encapsulates the full
# release-atomicity flow:
#
#   preflight → build → release → publish → bump-pr
#
#   preflight: read-only validation (main-tip guard, NBGV version,
#              tag-existence, changelog + non-empty check for stable).
#              Uploads CHANGES.md as a workflow artifact.
#   build:     invokes _build-template.yml at the validated main-tip SHA.
#   release:   gh release create (first reversible side effect).
#   publish:   dotnet nuget push + gh release upload (irreversible).
#   bump-pr:   stable path only; opens the next-dev bump PR after publish.
#
# The template is component-agnostic; everything component-specific is
# driven off `component-name` and the handful of path inputs below.

name: _release-template

on:
  workflow_call:
    inputs:
      component-name:
        description: 'Short component name (e.g. "link" or "cli"). Drives tag prefix, artifact names, bump branch, and commit scope.'
        required: true
        type: string
      display-name:
        description: 'Human label for the release build test-reporter check run (e.g., "Link tests (release)").'
        required: true
        type: string
      project-path:
        description: 'Path to the component folder containing version.json (e.g., "src/GroundControl.Link").'
        required: true
        type: string
      test-project:
        description: 'Path to the test csproj.'
        required: true
        type: string
      pack-project:
        description: 'Path to the csproj to pack.'
        required: true
        type: string
      cliff-config:
        description: 'Path to the git-cliff config for this component (e.g., ".github/cliff/link.toml").'
        required: true
        type: string
      is-tool:
        description: 'Whether pack-project is a .NET global tool and should be smoke-tested by _build-template.yml.'
        required: false
        type: boolean
        default: false
      tool-command:
        description: 'Command name produced by the global tool (required when is-tool is true).'
        required: false
        type: string
        default: ''
      versionIncrement:
        description: 'STABLE path only: component to bump on main after the release (patch/minor/major).'
        required: false
        type: string
        default: 'minor'
      dryRun:
        description: 'Run preflight + build but do not tag, release, publish, or open the bump PR.'
        required: false
        type: boolean
        default: false

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_type: ${{ steps.type.outputs.release_type }}
      version_field: ${{ steps.type.outputs.version_field }}
      release_sha: ${{ github.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Assert dispatch is at main tip
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::release must be dispatched from the 'main' branch (got ${{ github.ref }})"
            exit 1
          fi
          MAIN_TIP=$(git rev-parse origin/main)
          if [ "${{ github.sha }}" != "${MAIN_TIP}" ]; then
            echo "::error::release must be dispatched at main tip (got ${{ github.sha }}, tip is ${MAIN_TIP})"
            exit 1
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Determine release type from version.json
        id: type
        run: |
          VERSION_FIELD=$(jq -r .version ${{ inputs.project-path }}/version.json)
          echo "version.json version: ${VERSION_FIELD}"
          case "${VERSION_FIELD}" in
            *-preview*) RELEASE_TYPE=preview ;;
            *)          RELEASE_TYPE=stable ;;
          esac
          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"
          echo "version_field=${VERSION_FIELD}" >> "$GITHUB_OUTPUT"
          echo "Release type: ${RELEASE_TYPE}"

      - name: Compute release version from NBGV
        id: version
        run: |
          VERSION=$(nbgv get-version -p ${{ inputs.project-path }} -v SemVer2)
          echo "NBGV SemVer2: ${VERSION}"

          # Sanity-check: NBGV's output must agree with the release type we
          # inferred from version.json. A preview run must produce a
          # prerelease version, a stable run must not.
          case "${{ steps.type.outputs.release_type }}/${VERSION}" in
            preview/*-preview*) ;;
            preview/*)
              echo "::error::Release type is 'preview' but NBGV produced '${VERSION}' (no prerelease tag). Check publicReleaseRefSpec in version.json."
              exit 1
              ;;
            stable/*-*)
              echo "::error::Release type is 'stable' but NBGV produced '${VERSION}' (has prerelease/metadata). Ensure main is on a publicReleaseRefSpec ref and version.json has no '-preview' tag."
              exit 1
              ;;
            stable/*) ;;
          esac

          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${{ inputs.component-name }}/v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          TAG='${{ steps.version.outputs.release_tag }}'
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists on origin. Push a new commit to main (preview) or merge the post-release bump PR (stable) before re-running."
            exit 1
          fi

      - name: Generate changelog from Conventional Commits
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72  # v4
        with:
          config: ${{ inputs.cliff-config }}
          args: --unreleased --tag ${{ steps.version.outputs.release_tag }} --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Require non-empty changelog for stable releases
        if: ${{ steps.type.outputs.release_type == 'stable' }}
        run: |
          if [ ! -s CHANGES.md ] || ! grep -q '[^[:space:]]' CHANGES.md; then
            echo "::error::No conventional commits since the last stable release — nothing to ship."
            exit 1
          fi

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.component-name }}-release-changelog
          path: CHANGES.md
          if-no-files-found: error

      - name: Dry-run summary
        if: ${{ inputs.dryRun }}
        run: |
          {
            echo "## Dry run — ${{ inputs.component-name }} ${{ steps.type.outputs.release_type }} release"
            echo ""
            echo "- Tag: \`${{ steps.version.outputs.release_tag }}\`"
            echo "- Target: \`${{ github.sha }}\`"
            echo ""
            echo "### Changelog"
            echo ""
            if [ -s CHANGES.md ]; then cat CHANGES.md; else echo "_(empty)_"; fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build release artifact
    needs: preflight
    permissions:
      contents: read
      checks: write  # test-reporter check run published by _build-template.yml
    uses: ./.github/workflows/_build-template.yml
    with:
      component-name: ${{ inputs.component-name }}
      display-name: ${{ inputs.display-name }}
      test-project: ${{ inputs.test-project }}
      pack-project: ${{ inputs.pack-project }}
      is-tool: ${{ inputs.is-tool }}
      tool-command: ${{ inputs.tool-command }}
      ref: ${{ needs.preflight.outputs.release_sha }}

  release:
    name: Create GitHub Release
    needs: [preflight, build]
    if: ${{ !inputs.dryRun }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # gh release create + tag
    outputs:
      release_created: ${{ steps.create_release.outputs.created }}
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          fetch-depth: 1

      - name: Download changelog artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.component-name }}-release-changelog

      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE_FLAG: ${{ needs.preflight.outputs.release_type == 'preview' && '--prerelease' || '' }}
        run: |
          gh release create "${{ needs.preflight.outputs.release_tag }}" \
            --target "${{ needs.preflight.outputs.release_sha }}" \
            ${PRERELEASE_FLAG} \
            --title "${{ needs.preflight.outputs.release_tag }}" \
            --notes-file CHANGES.md
          echo "created=true" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to nuget.org
    needs: [preflight, release]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: nuget
    permissions:
      contents: write  # gh release upload
      id-token: write  # OIDC trusted publishing to nuget.org
    steps:
      - name: Download package artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.component-name }}-nupkg
          path: artifacts/package

      - name: Login to nuget.org via trusted publishing (OIDC)
        id: nuget_login
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544  # v1
        with:
          user: mrtaikandi

      - name: Push to nuget.org
        run: |
          dotnet nuget push 'artifacts/package/*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key '${{ steps.nuget_login.outputs.NUGET_API_KEY }}' \
            --skip-duplicate

      - name: Attach package to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload '${{ needs.preflight.outputs.release_tag }}' \
            artifacts/package/*.nupkg \
            artifacts/package/*.snupkg \
            --repo '${{ github.repository }}' \
            --clobber

  bump-pr:
    name: Open post-release bump PR
    needs: [preflight, release, publish]
    if: ${{ needs.release.outputs.release_created == 'true' && needs.preflight.outputs.release_type == 'stable' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # push bump branch
      pull-requests: write  # gh pr create
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Compute next development version
        id: next
        run: |
          CURRENT='${{ needs.preflight.outputs.version_field }}'
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"
          PATCH=${PATCH:-0}

          case '${{ inputs.versionIncrement }}' in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          if [ "${PATCH}" = "0" ]; then
            NEXT="${MAJOR}.${MINOR}-preview"
          else
            NEXT="${MAJOR}.${MINOR}.${PATCH}-preview"
          fi

          echo "next_version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "bump_branch=chore/${{ inputs.component-name }}-bump-to-${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next development version: ${NEXT}"

      - name: Open bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH='${{ steps.next.outputs.bump_branch }}'
          NEXT='${{ steps.next.outputs.next_version }}'
          TAG='${{ needs.preflight.outputs.release_tag }}'

          git checkout -b "${BRANCH}"
          nbgv set-version "${NEXT}" -p ${{ inputs.project-path }}
          git add ${{ inputs.project-path }}/version.json
          git commit -m "chore(${{ inputs.component-name }}): bump to ${NEXT}"
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(${{ inputs.component-name }}): bump to ${NEXT}" \
            --body "Post-release bump after publishing \`${TAG}\`. Starts the next development line. Merge before running \`${{ inputs.component-name }}-release\` again, or preview builds will collide with the just-published tag."
