# GroundControl.Link — cut a release and publish to nuget.org.
#
# Thin wrapper around _release.yml. See that file for the full release-
# atomicity flow.

name: link-release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'STABLE path only: component to bump on main after the release (default: minor).'
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      dryRun:
        description: 'Run plan-release + build-test-pack (incl. tests) but do not tag, release, publish, or open the bump PR.'
        type: boolean
        default: false

concurrency:
  group: link-release
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_release.yml
    permissions:
      contents: write       # gh release create + bump PR push
      pull-requests: write  # bump version PR
      id-token: write       # OIDC to nuget.org
      checks: write         # dorny/test-reporter in _release.yml's build-test-pack job
    secrets: inherit
    with:
      component-name: link
      display-name: Link tests (release)
      project-path: src/GroundControl.Link
      test-targets: tests/GroundControl.Link.Tests/GroundControl.Link.Tests.csproj
      pack-project: src/GroundControl.Link/GroundControl.Link.csproj
      solution: GroundControl.slnx
      cliff-config: .github/cliff/link.toml
      nuget-user: mrtaikandi
      versionIncrement: ${{ inputs.versionIncrement }}
      dryRun: ${{ inputs.dryRun }}