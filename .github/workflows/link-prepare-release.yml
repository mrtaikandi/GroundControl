# GroundControl.Link — prepare a release.
#
# Manual workflow (workflow_dispatch) that cuts a new release:
#   1. Runs `nbgv prepare-release` on main, which creates a v<Major>.<Minor>
#      release branch and bumps main's version.json to the next dev version.
#   2. Pushes both branches.
#   3. Generates Markdown release notes from Conventional Commits with git-cliff.
#   4. Creates a DRAFT GitHub Release targeting the new release branch.
#
# The draft is left for a maintainer to review/edit and publish. Publishing the
# draft is what ultimately fires link-publish.yml to push to nuget.org.

name: link-prepare-release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'Version component to bump on main after cutting the release branch'
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      tagPrefix:
        description: 'Tag prefix for the release (e.g. "v")'
        type: string
        default: 'v'

concurrency:
  group: link-prepare-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Cut release branch & draft release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Capture release branch name (pre-bump major.minor)
        id: branch
        run: |
          MM=$(nbgv get-version -v MajorMinorVersion)
          echo "release_branch=v${MM}" >> "$GITHUB_OUTPUT"

      - name: Run nbgv prepare-release
        run: nbgv prepare-release --versionIncrement ${{ inputs.versionIncrement }}

      - name: Push main and release branch
        run: |
          git push origin main
          git push origin ${{ steps.branch.outputs.release_branch }}

      - name: Compute release version from release branch
        id: version
        run: |
          git checkout ${{ steps.branch.outputs.release_branch }}
          VERSION=$(nbgv get-version -v SemVer2)
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${{ inputs.tagPrefix }}${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from Conventional Commits
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.version.outputs.release_tag }} --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.release_tag }}" \
            --target "${{ steps.branch.outputs.release_branch }}" \
            --draft \
            --title "${{ steps.version.outputs.release_tag }}" \
            --notes-file CHANGES.md
