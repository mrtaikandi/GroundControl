# Reusable build, test & pack job for a single component.
#
# Called by both CI workflows (link-ci, cli-ci) for PR and push validation,
# and by release workflows (link-release, cli-release) so the nupkg pushed
# to nuget.org is the exact artifact produced here (single provenance path).
#
# NBGV needs full git history to compute the version at pack time, so this
# template always checks out with fetch-depth: 0.

name: _build-template

on:
  workflow_call:
    inputs:
      component-name:
        description: 'Short component name used for artifact names (e.g., "link" or "cli").'
        required: true
        type: string
      display-name:
        description: 'Human label for the test-reporter check run (e.g., "Link tests").'
        required: true
        type: string
      test-project:
        description: 'Path to the test csproj.'
        required: true
        type: string
      pack-project:
        description: 'Path to the csproj to pack.'
        required: true
        type: string
      is-tool:
        description: 'Whether pack-project is a .NET global tool and should be smoke-tested.'
        required: false
        type: boolean
        default: false
      tool-command:
        description: 'Command name produced by the global tool (required when is-tool is true).'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to check out. Leave blank to use the triggering event default.'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build, test & pack (${{ inputs.component-name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props

      - name: Restore
        run: dotnet restore ${{ inputs.test-project }}

      - name: Build
        run: dotnet build ${{ inputs.test-project }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ inputs.test-project }} --configuration Release --no-build -- --report-xunit-trx --report-xunit-trx-filename test_results.trx --results-directory "${{ github.workspace }}/artifacts/test-results"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.component-name }}-test-results
          path: artifacts/test-results/**/*.trx
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc  # v1
        with:
          name: ${{ inputs.display-name }}
          path: artifacts/test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Pack
        run: dotnet pack ${{ inputs.pack-project }} --configuration Release --no-build --output artifacts/package

      - name: Put dotnet tools on PATH
        if: ${{ inputs.is-tool }}
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Tool-install smoke test
        if: ${{ inputs.is-tool }}
        run: |
          NUPKG=$(ls artifacts/package/*.nupkg | head -n1)
          TOOL_ID=$(basename "${NUPKG}" | sed -E 's|^(.+)\.([0-9].+)\.nupkg$|\1|')
          TOOL_VERSION=$(basename "${NUPKG}" | sed -E 's|^(.+)\.([0-9].+)\.nupkg$|\2|')
          echo "Installing ${TOOL_ID} ${TOOL_VERSION} from the packed artifact only..."
          # --source (not --add-source) restricts resolution to the local feed, so a
          # collision with a same-versioned package already on nuget.org can't silently
          # pass this test.
          dotnet tool install -g --source "${{ github.workspace }}/artifacts/package" "${TOOL_ID}" --version "${TOOL_VERSION}"
          ${{ inputs.tool-command }} --version
          ${{ inputs.tool-command }} --help > /dev/null
          dotnet tool uninstall -g "${TOOL_ID}"

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.component-name }}-nupkg
          path: |
            artifacts/package/*.nupkg
            artifacts/package/*.snupkg
          if-no-files-found: error
