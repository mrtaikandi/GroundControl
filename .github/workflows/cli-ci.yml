# GroundControl.Cli — continuous integration.
#
# Runs on every pull request and on pushes to main that touch the Cli or
# the projects it bundles (Api.Client, Host.Cli). Delegates the actual
# build, test & pack to the reusable _build-template.yml so that CI and
# release build via the same code path (single provenance). Does NOT
# publish to any package feed — publishing is handled exclusively by
# cli-release.yml.

name: cli-ci

on:
  pull_request:
    paths:
      - 'src/GroundControl.Cli/**'
      - 'src/GroundControl.Api.Client/**'
      - 'src/GroundControl.Host.Cli/**'
      - 'tests/GroundControl.Cli.Tests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'version.json'
      - '.github/workflows/cli-ci.yml'
      - '.github/workflows/_build-template.yml'
  # push: main trigger disabled — solo maintainer, so a semantic-conflict
  # breakage on main is caught by the next PR's CI and by the release
  # workflow's 'build' job. Re-enable once multiple active contributors
  # share this repo.
  #
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'src/GroundControl.Cli/**'
  #     - 'src/GroundControl.Api.Client/**'
  #     - 'src/GroundControl.Host.Cli/**'
  #     - 'tests/GroundControl.Cli.Tests/**'
  #     - 'Directory.Build.props'
  #     - 'Directory.Packages.props'
  #     - 'global.json'
  #     - 'version.json'
  #     - '.github/workflows/cli-ci.yml'
  #     - '.github/workflows/_build-template.yml'

concurrency:
  group: cli-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    uses: ./.github/workflows/_build-template.yml
    with:
      component-name: cli
      display-name: Cli tests
      test-project: tests/GroundControl.Cli.Tests/GroundControl.Cli.Tests.csproj
      pack-project: src/GroundControl.Cli/GroundControl.Cli.csproj
      is-tool: true
      tool-command: groundcontrol
