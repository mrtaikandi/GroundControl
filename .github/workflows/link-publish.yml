# GroundControl.Link — publish to nuget.org.
#
# Triggered only by publishing a GitHub Release whose tag starts with 'v'.
# Gated by the 'nuget' GitHub Environment, which requires reviewer approval
# before the job runs. Checks out the release branch (release.target_commitish)
# so Nerdbank.GitVersioning sees a public-release ref and emits a clean SemVer,
# verifies the built NBGV version matches the release tag, re-runs tests,
# packs the library, and pushes it to nuget.org using NuGet Trusted Publishing
# (OIDC) — no long-lived API key.

name: link-publish

on:
  release:
    types: [published]

concurrency:
  group: link-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to nuget.org
    # Scope this workflow to Link releases only: tag must start with 'v' and
    # target a release branch (v* or main). Other components will add their
    # own publish workflows with their own tag conventions.
    if: ${{ startsWith(github.event.release.tag_name, 'v') && !github.event.release.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: nuget
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          # Use the branch the release targets (e.g. v1.2) so NBGV sees a
          # public-release ref from publicReleaseRefSpec and emits a clean
          # SemVer (no height-suffixed prerelease).
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Verify NBGV version matches release tag
        run: |
          NBGV_VERSION=$(nbgv get-version -v SemVer2)
          TAG='${{ github.event.release.tag_name }}'
          EXPECTED="${TAG#v}"
          echo "NBGV SemVer2      : ${NBGV_VERSION}"
          echo "Expected from tag : ${EXPECTED}"
          if [ "${NBGV_VERSION}" != "${EXPECTED}" ]; then
            echo "::error::NBGV version ${NBGV_VERSION} does not match release tag ${TAG} (expected ${EXPECTED})"
            exit 1
          fi

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore tests/GroundControl.Link.Tests/GroundControl.Link.Tests.csproj

      - name: Build
        run: dotnet build tests/GroundControl.Link.Tests/GroundControl.Link.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/GroundControl.Link.Tests/GroundControl.Link.Tests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/GroundControl.Link/GroundControl.Link.csproj --configuration Release --no-build --output artifacts/package

      - name: Login to nuget.org via trusted publishing (OIDC)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: mrtaikandi

      - name: Push to nuget.org
        run: |
          dotnet nuget push 'artifacts/package/*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key '${{ steps.nuget_login.outputs.NUGET_API_KEY }}' \
            --skip-duplicate

      - name: Attach package to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload '${{ github.event.release.tag_name }}' \
            artifacts/package/*.nupkg \
            artifacts/package/*.snupkg \
            --clobber
