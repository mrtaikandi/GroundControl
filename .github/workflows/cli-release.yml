# GroundControl.Cli — cut a release and publish to nuget.org.
#
# Thin wrapper around _release.yml. See that file for the full release-
# atomicity flow. Tags are prefixed with "cli/" so they don't collide
# with other components' tags.

name: cli-release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'Next Version: STABLE path only: component to bump on main after the release (default: minor).'
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      dryRun:
        description: 'Dry-Run: plan-release + build-test-pack, but do not tag, release, publish, or open the bump PR.'
        type: boolean
        default: false

concurrency:
  group: cli-release
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_release.yml
    permissions:
      contents: write       # gh release create + bump PR push
      pull-requests: write  # bump version PR
      id-token: write       # OIDC to nuget.org
      checks: write         # dorny/test-reporter in _release.yml's build-test-pack job
    secrets: inherit
    with:
      component-name: cli
      display-name: Cli tests (release)
      project-path: src/GroundControl.Cli
      test-targets: |
        tests/GroundControl.Api.Client.Tests/GroundControl.Api.Client.Tests.csproj
        tests/GroundControl.Cli.Tests/GroundControl.Cli.Tests.csproj
        tests/GroundControl.E2E.Tests/GroundControl.E2E.Tests.csproj
      pack-project: src/GroundControl.Cli/GroundControl.Cli.csproj
      solution: GroundControl.slnx
      cliff-config: .github/cliff/cli.toml
      nuget-user: mrtaikandi
      is-tool: true
      tool-command: groundcontrol
      versionIncrement: ${{ inputs.versionIncrement }}
      dryRun: ${{ inputs.dryRun }}