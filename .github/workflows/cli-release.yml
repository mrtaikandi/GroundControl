# GroundControl.Cli — cut a release and publish to nuget.org.
#
# Thin wrapper around _release.yml. See that file for the full release-
# atomicity flow. Tags are prefixed with "cli/" so they don't collide
# with other components' tags.

name: cli-release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'STABLE path only: component to bump on main after the release (default: minor).'
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      dryRun:
        description: 'Run plan-release + build-test-pack (incl. tests and smoke test) but do not tag, release, publish, or open the bump PR.'
        type: boolean
        default: false

concurrency:
  group: cli-release
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_release.yml
    permissions:
      contents: write       # gh release create + bump PR push
      pull-requests: write  # bump PR
      id-token: write       # OIDC to nuget.org
      checks: write         # test-reporter in _release.yml
    secrets: inherit
    with:
      component-name: cli
      display-name: Cli tests (release)
      project-path: src/GroundControl.Cli
      test-project: tests/GroundControl.Cli.Tests/GroundControl.Cli.Tests.csproj
      pack-project: src/GroundControl.Cli/GroundControl.Cli.csproj
      cliff-config: .github/cliff/cli.toml
      nuget-user: mrtaikandi
      is-tool: true
      tool-command: groundcontrol
      versionIncrement: ${{ inputs.versionIncrement }}
      dryRun: ${{ inputs.dryRun }}
