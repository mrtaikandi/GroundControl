# GroundControl.Link — continuous integration.
#
# Runs on every pull request and on pushes to main. Delegates the actual
# build, test & pack to the reusable _build-template.yml so that CI and
# release build via the same code path (single provenance). Does NOT
# publish to any package feed — publishing is handled exclusively by
# link-release.yml.

name: link-ci

on:
  pull_request:
    paths:
      - 'src/GroundControl.Link/**'
      - 'tests/GroundControl.Link.Tests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'version.json'
      - '.github/workflows/link-ci.yml'
      - '.github/workflows/_build-template.yml'
  # push: main trigger disabled — solo maintainer, so a semantic-conflict
  # breakage on main is caught by the next PR's CI and by the release
  # workflow's 'build' job. Re-enable once multiple active contributors
  # share this repo.
  #
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'src/GroundControl.Link/**'
  #     - 'tests/GroundControl.Link.Tests/**'
  #     - 'Directory.Build.props'
  #     - 'Directory.Packages.props'
  #     - 'global.json'
  #     - 'version.json'
  #     - '.github/workflows/link-ci.yml'
  #     - '.github/workflows/_build-template.yml'

concurrency:
  group: link-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    uses: ./.github/workflows/_build-template.yml
    with:
      component-name: link
      display-name: Link tests
      test-project: tests/GroundControl.Link.Tests/GroundControl.Link.Tests.csproj
      pack-project: src/GroundControl.Link/GroundControl.Link.csproj
