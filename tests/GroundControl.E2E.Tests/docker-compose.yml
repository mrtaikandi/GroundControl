name: groundcontrol-e2e

services:
  mongodb:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - ./build/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch(e) { quit(1) }"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - e2e_net

  api:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "0:8080"
    volumes:
      - dp_keys:/keys
    environment:
      ConnectionStrings__Storage: "mongodb://mongodb:27017/?replicaSet=rs0"
      Persistence__MongoDb__DatabaseName: "groundcontrol_e2e"
      Authentication__AuthenticationMode: "None"
      DataProtection__Mode: "FileSystem"
      DataProtection__KeyStorePath: "/keys"
      ChangeNotifier__Mode: "InProcess"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - e2e_net

volumes:
  dp_keys:

networks:
  e2e_net:
    driver: bridge
